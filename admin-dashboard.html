<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Embassy of the DRC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#f5f7fa]">
    <!-- Top Nav -->
    <nav class="bg-[#0f2a4d] text-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-14">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="assets/images/Coat_of_Arms_Democratic_Republic_of_Congo.png" alt="Coat of Arms" class="h-8 w-auto">
                    <span class="font-semibold text-sm hidden sm:block">Admin Dashboard</span>
                </a>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-[#1a4a7a] rounded-full flex items-center justify-center text-sm font-bold">AD</div>
                        <span class="hidden md:block text-sm">Admin User</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
            <div class="card p-5">
                <div class="text-2xl font-bold text-[#0f2a4d] mb-1">12,450</div>
                <div class="text-sm text-[#4a5568]">Total Citizens</div>
            </div>
            <div class="card p-5">
                <div class="text-2xl font-bold text-[#0f2a4d] mb-1">8,934</div>
                <div class="text-sm text-[#4a5568]">Applications</div>
            </div>
            <div class="card p-5">
                <div class="text-2xl font-bold text-[#0f2a4d] mb-1">3,256</div>
                <div class="text-sm text-[#4a5568]">Appointments</div>
            </div>
            <div class="card p-5">
                <div class="text-2xl font-bold text-[#0f2a4d] mb-1">6,230</div>
                <div class="text-sm text-[#4a5568]">Completed</div>
            </div>
        </div>
        
        <div class="grid lg:grid-cols-2 gap-8 mb-8">
            <div class="card p-6">
                <h2 class="font-semibold text-[#0f2a4d] mb-4">Applications Overview</h2>
                <canvas id="appsChart" height="250"></canvas>
            </div>
            <div class="card p-6">
                <h2 class="font-semibold text-[#0f2a4d] mb-4">Appointment Statistics</h2>
                <canvas id="apptChart" height="250"></canvas>
            </div>
        </div>
        
        <div class="card p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="font-semibold text-[#0f2a4d]">Recent Applications</h2>
                <a href="case-management.html" class="text-sm text-[#1a4a7a] hover:underline">View All</a>
            </div>
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-[#e1e5eb]">
                        <th class="text-left py-3 text-[#4a5568] font-medium">ID</th>
                        <th class="text-left py-3 text-[#4a5568] font-medium">Citizen</th>
                        <th class="text-left py-3 text-[#4a5568] font-medium">Service</th>
                        <th class="text-left py-3 text-[#4a5568] font-medium">Status</th>
                        <th class="text-left py-3 text-[#4a5568] font-medium">Date</th>
                    </tr>
                </thead>
                <tbody id="admin-recent-cases"></tbody>
            </table>
        </div>
    </div>
    
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Applications Chart
            const appsCtx = document.getElementById('appsChart').getContext('2d');
            new Chart(appsCtx, {
                type: 'bar',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Applications',
                        data: [120, 190, 150, 220, 280, 180],
                        backgroundColor: '#0f2a4d'
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
            
            // Appointments Chart
            const apptCtx = document.getElementById('apptChart').getContext('2d');
            new Chart(apptCtx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                    datasets: [{
                        label: 'Appointments',
                        data: [65, 78, 90, 110, 95, 125],
                        borderColor: '#0f2a4d',
                        backgroundColor: 'rgba(15, 42, 77, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        });
    </script>
</body>
</html>
