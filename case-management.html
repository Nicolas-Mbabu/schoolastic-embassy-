<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Management | Embassy of the DRC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#f5f7fa]">
    <!-- Top Nav -->
    <nav class="bg-[#0f2a4d] text-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-14">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="assets/images/Coat_of_Arms_Democratic_Republic_of_Congo.png" alt="Coat of Arms" class="h-8 w-auto">
                    <span class="font-semibold text-sm hidden sm:block">Case Management</span>
                </a>
                <a href="admin-dashboard.html" class="text-sm hover:text-gray-300">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 mb-6">
            <h1 class="text-2xl font-bold text-[#0f2a4d]">All Cases</h1>
            <div class="flex flex-wrap gap-3">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                    <input id="case-search" type="text" class="input-field pl-10 pr-4 py-2 text-sm" placeholder="Search cases...">
                </div>
                <select id="case-status-filter" class="input-field px-4 py-2 text-sm">
                    <option value="">All Statuses</option>
                    <option value="registered">Demande enregistree</option>
                    <option value="appointment_confirmed">Rendez-vous confirme</option>
                    <option value="documents_submitted">Documents deposes</option>
                    <option value="administrative_review">Verification administrative</option>
                    <option value="consular_validation">Validation consulaire</option>
                    <option value="document_available">Document disponible</option>
                    <option value="additional_documents">Documents complementaires requis</option>
                    <option value="rejected">Demande refusee</option>
                </select>
            </div>
        </div>
        
        <div class="card p-6">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-[#e1e5eb]">
                            <th class="text-left py-3 text-[#4a5568] font-medium">Case ID</th>
                            <th class="text-left py-3 text-[#4a5568] font-medium">Citizen</th>
                            <th class="text-left py-3 text-[#4a5568] font-medium">Service</th>
                            <th class="text-left py-3 text-[#4a5568] font-medium">Status</th>
                            <th class="text-left py-3 text-[#4a5568] font-medium">Date</th>
                            <th class="text-left py-3 text-[#4a5568] font-medium">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="case-management-body"></tbody>
                </table>
            </div>
            
            <div class="flex items-center justify-between mt-6 pt-6 border-t border-[#e1e5eb]">
                <p class="text-sm text-[#4a5568]">Dossiers enregistres localement</p>
                <div class="flex gap-2">
                    <button class="btn-secondary px-3 py-1 text-sm">Previous</button>
                    <button class="btn-primary px-3 py-1 text-sm">1</button>
                    <button class="btn-secondary px-3 py-1 text-sm">2</button>
                    <button class="btn-secondary px-3 py-1 text-sm">3</button>
                    <button class="btn-secondary px-3 py-1 text-sm">Next</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
