<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Dashboard | Embassy of the DRC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-[#f5f7fa]">
    <!-- Top Nav -->
    <nav class="bg-[#0f2a4d] text-white shadow-sm sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-14">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="assets/images/Coat_of_Arms_Democratic_Republic_of_Congo.png" alt="Coat of Arms" class="h-8 w-auto">
                    <span class="font-semibold text-sm hidden sm:block">Citizen Portal</span>
                </a>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-[#1a4a7a] rounded-full flex items-center justify-center text-sm font-bold">JM</div>
                        <span class="hidden md:block text-sm">Citizen User</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Dashboard Content -->
    <div id="citizen-dashboard-content" class="max-w-7xl mx-auto px-4 py-8">
    </div>
    <script src="js/app.js"></script>
</body>
</html>
